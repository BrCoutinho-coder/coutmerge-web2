<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoutMerge Web | Automador Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --text: #1e293b; --primary: #0f172a; --primary-hover: #334155; --accent: #2563eb; --border: #cbd5e1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 30px 20px; margin: 0; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 900px; padding-bottom: 60px; }
        .header-title { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; text-align: center; letter-spacing: -0.5px; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); height: 100%; box-sizing: border-box; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 15px; }
        
        .csv-zone { border: 2px dashed var(--border); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; background: #f8fafc; transition: 0.2s; position: relative; min-height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .csv-zone:hover { border-color: var(--accent); }
        .csv-zone input[type=file] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; color: var(--primary); }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }

        .btn { border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-start { background-color: var(--accent); color: white; margin-top: 20px; }
        .btn-start:hover { background-color: #1d4ed8; }
        .btn-pause { background-color: var(--warning); color: white; display: none; margin-top: 10px; }
        .btn-stop { background-color: var(--danger); color: white; display: none; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); display: none; margin-top: 10px; }
        
        /* Dashboard Horizontal */
        .bottom-dashboard { margin-top: 20px; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); display: none; }
        .status-highlight { font-size: 1.1rem; font-weight: 600; color: var(--primary); text-align: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: var(--bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: flex-start; }
        .stat-card span:first-child { font-size: 0.75rem; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .stats-val { font-size: 1.2rem; color: var(--primary); font-weight: 700; }
        
        progress { width: 100%; height: 8px; border-radius: 4px; display: none; margin-top: 20px; }
        progress::-webkit-progress-bar { background-color: var(--border); border-radius: 4px; }
        progress::-webkit-progress-value { background-color: var(--accent); border-radius: 4px; }
        
        #downloads { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { #downloads { grid-template-columns: 1fr; } }
        .btn-download { background: var(--success); color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 600; text-align: center; font-size: 0.85rem; }
        .btn-download:hover { background: #059669; }

        .watermark-ui { position: fixed; bottom: 15px; right: 20px; font-size: 0.85rem; color: #94a3b8; font-weight: 500; text-decoration: none; transition: 0.3s; z-index: 100; }
        .watermark-ui:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="header-title">CoutMerge Web</div>
        
        <div class="grid-layout">
            <div class="panel">
                <h3>1. Regras de Processamento</h3>
                <div class="csv-zone" id="csvZone">
                    <span id="csvName">📄 Anexar Planilha CSV (Opcional)</span>
                    <input type="file" id="csvInput" accept=".csv">
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="chkMerge" checked> Mesclar PDFs e Imagens</label>
                    <label><input type="checkbox" id="chkRename" checked> Renomear nomes pelo CSV</label>
                    <label><input type="checkbox" id="chkLot" checked> Organizar ZIPs por Lote</label>
                </div>
            </div>

            <div class="panel">
                <h3>2. Execução</h3>
                <div class="csv-zone" style="background: #e0f2fe; border-color: #7dd3fc;">
                    <span id="filesCountUI" style="font-weight: 600;">📁 Selecionar Arquivos Brutos</span>
                    <input type="file" id="fileInput" multiple accept=".pdf, .jpg, .jpeg, .png">
                </div>
                <button class="btn btn-outline" id="btnExportCsv" style="display: none; border-color: var(--success); color: var(--success); border-width: 2px;">📥 Gerar Planilha Base (Excel)</button>
                <button class="btn btn-start" id="startBtn">▶️ Iniciar Processamento</button>
                <button class="btn btn-pause" id="pauseBtn">⏸️ Pausar</button>
                <button class="btn btn-stop" id="stopBtn">⏹️ Parar</button>
                <button class="btn btn-outline" id="clearBtn">🧹 Limpar Interface</button>
            </div>
        </div>

        <div class="bottom-dashboard" id="bottomDashboard">
            <div class="status-highlight" id="stStatus">Aguardando Início...</div>
            <div class="stats-grid">
                <div class="stat-card"><span>Lote / Parte</span><span class="stats-val" id="stBatchName">-</span></div>
                <div class="stat-card"><span>Lidos</span><span class="stats-val" id="stProgress">0 / 0</span></div>
                <div class="stat-card"><span>Gerados</span><span class="stats-val" id="stGenerated" style="color: var(--success);">0</span></div>
                <div class="stat-card"><span>Ignorados CSV</span><span class="stats-val" id="stMissing" style="color: var(--danger);">0</span></div>
                <div class="stat-card"><span>Tempo ETA</span><span class="stats-val" id="stEta">00:00</span></div>
            </div>
            <progress id="progressBar" value="0" max="100"></progress>
            <div id="downloads"></div>
        </div>
    </div>

    <a href="https://github.com/BrenoCoutinho" target="_blank" class="watermark-ui">Desenvolvido por Breno Coutinho</a>

    <script>
        const yieldToBrowser = (ms = 15) => new Promise(resolve => setTimeout(resolve, ms));
        const formatTime = (ms) => {
            if (!ms || ms === Infinity || isNaN(ms)) return "Calculando...";
            const s = Math.floor(ms / 1000);
            return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
        };

        const cleanExcelString = (str) => {
            if(!str) return "";
            return str.replace(/^="(.+)"$/, '$1').replace(/^"(.+)"$/, '$1').replace(/"/g, '').trim();
        };

        let isPaused = false, isStopped = false, generatedUrls = [], csvDatabase = {}, rawFiles = [];

        // --- CARREGAMENTO CSV ---
        document.getElementById('csvInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                const sep = lines[0].includes(';') ? ';' : ',';
                const headers = lines[0].split(sep).map(h => cleanExcelString(h).toUpperCase());
                const idxAtual = headers.indexOf('NOME ATUAL'), idxNovo = headers.indexOf('NOVO NOME'), idxLote = headers.indexOf('LOTE');
                csvDatabase = {};
                for(let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(sep).map(c => cleanExcelString(c));
                    if(idxAtual > -1 && cols[idxAtual]) {
                        csvDatabase[cols[idxAtual]] = { novoNome: cols[idxNovo] || cols[idxAtual], lote: cols[idxLote] || '' };
                    }
                }
                document.getElementById('csvName').innerText = `✅ CSV: ${file.name}`;
                document.getElementById('csvName').style.color = 'var(--success)';
            };
            reader.readAsText(file);
        });

        // --- SELEÇÃO DE ARQUIVOS ---
        document.getElementById('fileInput').addEventListener('change', (e) => {
            rawFiles = Array.from(e.target.files);
            if(rawFiles.length > 0) {
                document.getElementById('filesCountUI').innerText = `✅ ${rawFiles.length} Arquivos Pronto`;
                document.getElementById('btnExportCsv').style.display = 'flex';
            }
        });

        // --- EXPORTAÇÃO CSV (GITHUB COMPATÍVEL) ---
        document.getElementById('btnExportCsv').addEventListener('click', () => {
            const uniqueNames = new Set();
            rawFiles.forEach(file => {
                const base = file.name.split('.').slice(0, -1).join('.').replace(/_PD\d+$/i, '');
                uniqueNames.add(base);
            });
            let csvContent = "NOME ATUAL;NOVO NOME;LOTE\n";
            uniqueNames.forEach(name => {
                const fmt = /^\d+$/.test(name) || name.length > 12 ? `="${name}"` : name;
                csvContent += `${fmt};;\n`;
            });
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "Template_CoutMerge.csv";
            document.body.appendChild(link);
            link.click();
            setTimeout(() => { document.body.removeChild(link); URL.revokeObjectURL(url); }, 100);
        });

        // --- COMPRESSÃO DE IMAGEM ---
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1200 || h > 1200) { w > h ? (h = (h*1200)/w, w = 1200) : (w = (w*1200)/h, h = 1200); }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(b => b.arrayBuffer().then(resolve), 'image/jpeg', 0.6);
                    };
                };
            });
        };

        // --- MOTOR PRINCIPAL ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            const optMerge = document.getElementById('chkMerge').checked;
            const optRename = document.getElementById('chkRename').checked;
            const optLot = document.getElementById('chkLot').checked;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('btnExportCsv').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('bottomDashboard').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            
            isPaused = false; isStopped = false;
            let generatedCount = 0, missingCount = 0, processedCount = 0;
            const startTime = Date.now();

            // Mapeamento de Lotes
            const lotsMap = {};
            rawFiles.forEach(file => {
                const base = file.name.split('.').slice(0, -1).join('.').replace(/_PD\d+$/i, '');
                const match = file.name.match(/_PD(\d+)/i);
                const index = match ? parseInt(match[1]) : 0;
                const ext = file.name.split('.').pop().toLowerCase();
                
                let found = csvDatabase[base];
                let finalName = (optRename && found) ? found.novoNome : base;
                let lotName = (optLot && found) ? (found.lote || "Sem Lote") : (optLot ? "Diversos" : "Geral");
                
                if (!found && Object.keys(csvDatabase).length > 0) missingCount++;

                const key = (optMerge && match) ? base : file.name;
                if(!lotsMap[lotName]) lotsMap[lotName] = {};
                if(!lotsMap[lotName][key]) lotsMap[lotName][key] = { items: [], finalName, base };
                lotsMap[lotName][key].items.push({ file, index, ext, isPD: !!match });
            });

            document.getElementById('stMissing').innerText = missingCount;

            // Processamento por Lote (Trava de Memória 150MB)
            for (const [lotName, clients] of Object.entries(lotsMap)) {
                if (isStopped) break;
                let zip = new JSZip(), currentZipSize = 0, part = 1;

                for (const client of Object.values(clients)) {
                    if (isStopped) break;
                    while (isPaused) { if(isStopped) break; await yieldToBrowser(500); }

                    document.getElementById('stStatus').innerText = `Processando: ${client.base}`;
                    document.getElementById('stBatchName').innerText = `${lotName} (P${part})`;

                    let finalBuffer;
                    if (optMerge && client.items.length > 1) {
                        const mergedPdf = await PDFLib.PDFDocument.create();
                        client.items.sort((a,b) => a.index - b.index);
                        for (const item of client.items) {
                            if (item.ext === 'pdf') {
                                const pdf = await PDFLib.PDFDocument.load(await item.file.arrayBuffer());
                                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                                pages.forEach(p => mergedPdf.addPage(p));
                            } else {
                                const img = await mergedPdf.embedJpg(await compressImage(item.file));
                                const p = mergedPdf.addPage([595, 842]);
                                const scale = Math.min(550/img.width, 800/img.height);
                                p.drawImage(img, { x: 297-(img.width*scale/2), y: 421-(img.height*scale/2), width: img.width*scale, height: img.height*scale });
                            }
                            processedCount++;
                            document.getElementById('progressBar').value = (processedCount/rawFiles.length)*100;
                            document.getElementById('stProgress').innerText = `${processedCount}/${rawFiles.length}`;
                            document.getElementById('stEta').innerText = formatTime(((Date.now()-startTime)/processedCount)*(rawFiles.length-processedCount));
                            await yieldToBrowser(5);
                        }
                        finalBuffer = await mergedPdf.save();
                    } else {
                        finalBuffer = client.items[0].file;
                        processedCount += client.items.length;
                    }

                    const fileName = (optMerge && client.items[0].isPD) ? `${client.finalName}.pdf` : client.items[0].file.name;
                    zip.file(fileName, finalBuffer);
                    currentZipSize += (finalBuffer.byteLength || finalBuffer.size || 0);
                    generatedCount++;
                    document.getElementById('stGenerated').innerText = generatedCount;

                    // Quebra de Lote por Segurança (150MB)
                    if (currentZipSize > 150 * 1024 * 1024) {
                        await triggerZip(zip, `${lotName}_Parte${part}.zip`);
                        zip = new JSZip(); currentZipSize = 0; part++;
                    }
                }
                if (zip.files && Object.keys(zip.files).length > 0) {
                    await triggerZip(zip, part > 1 ? `${lotName}_Parte${part}.zip` : `${lotName}.zip`);
                }
            }
            finishUI();
        });

        async function triggerZip(zip, name) {
            document.getElementById('stStatus').innerText = `Compactando ${name}...`;
            const content = await zip.generateAsync({ type: "blob", compression: "STORE" });
            const url = URL.createObjectURL(content);
            const link = document.createElement('a');
            link.href = url; link.download = name; link.className = 'btn-download';
            link.innerText = `📦 Baixar ${name}`;
            document.getElementById('downloads').appendChild(link);
            link.click();
            await yieldToBrowser(1000);
        }

        function finishUI() {
            document.getElementById('stStatus').innerText = isStopped ? "Interrompido." : "Finalizado com Sucesso!";
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'block';
            document.getElementById('startBtn').style.display = 'block';
        }

        document.getElementById('clearBtn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
