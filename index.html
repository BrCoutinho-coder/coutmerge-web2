<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoutMerge Web | Automador Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --text: #1e293b; --primary: #0f172a; --primary-hover: #334155; --accent: #2563eb; --border: #cbd5e1; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 30px 20px; margin: 0; display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 1000px; padding-bottom: 60px; }
        .header-title { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 25px; text-align: center; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid var(--border); height: 100%; box-sizing: border-box; }
        .panel h3 { margin-top: 0; font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 15px; }
        
        .drop-zone { border: 2px dashed var(--border); padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 15px; background: #f8fafc; transition: 0.2s; position: relative; cursor: pointer; }
        .drop-zone:hover { border-color: var(--accent); background: #f0f7ff; }
        .drop-zone input[type=file] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .checkbox-group label { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; }
        .checkbox-group input { width: 20px; height: 20px; accent-color: var(--accent); }

        .btn { border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; display: flex; justify-content: center; gap: 10px; }
        .btn-start { background: var(--accent); color: white; margin-top: 15px; }
        .btn-start:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); margin-top: 10px; }
        .btn-outline:hover { background: var(--bg); }
        
        /* Dashboard Horizontal Moderno */
        .dashboard { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); display: none; flex-direction: column; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .stat-card .label { font-size: 0.75rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .stat-card .value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        
        #stStatus { font-weight: 700; color: var(--accent); text-align: center; }
        progress { width: 100%; height: 10px; border-radius: 5px; margin-top: 10px; }
        progress::-webkit-progress-bar { background: var(--border); border-radius: 5px; }
        progress::-webkit-progress-value { background: var(--accent); border-radius: 5px; }

        #downloads { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .btn-download { background: var(--success); color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 700; text-align: center; font-size: 0.85rem; }
        
        .watermark-ui { position: fixed; bottom: 15px; right: 20px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; text-decoration: none; z-index: 100; }
        .watermark-ui:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="header-title">CoutMerge Web</div>
        
        <div class="grid-layout">
            <div class="panel">
                <h3>1. Regras de Processamento</h3>
                <div class="drop-zone">
                    <span id="csvName">📄 Anexar Planilha CSV (Opcional)</span>
                    <input type="file" id="csvInput" accept=".csv">
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="chkMerge" checked> Mesclar PDFs e Imagens</label>
                    <label><input type="checkbox" id="chkRename" checked> Renomear nomes pelo CSV</label>
                    <label><input type="checkbox" id="chkLot" checked> Organizar ZIPs por Lote</label>
                </div>
            </div>

            <div class="panel">
                <h3>2. Arquivos brutos</h3>
                <div class="drop-zone" style="background: #e0f2fe; border-color: #7dd3fc;">
                    <span id="filesCountUI">📁 Selecionar Arquivos para Processar</span>
                    <input type="file" id="fileInput" multiple accept=".pdf, .jpg, .jpeg, .png">
                </div>
                <button class="btn btn-outline" id="btnExportCsv" style="display:none; border-color: var(--success); color: var(--success);">📥 Gerar Planilha Base Destes Arquivos</button>
                <button class="btn btn-start" id="startBtn">▶️ Iniciar Processamento</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-outline" id="pauseBtn" style="display:none; background: var(--warning); color:white; border:none;">⏸️ Pausar</button>
                    <button class="btn btn-outline" id="stopBtn" style="display:none; background: var(--danger); color:white; border:none;">⏹️ Parar</button>
                </div>
                <button class="btn btn-outline" id="clearBtn" style="display:none;">🧹 Limpar Tudo</button>
            </div>
        </div>

        <div class="dashboard" id="bottomDashboard">
            <div id="stStatus">Aguardando Comando...</div>
            <div class="stats-grid">
                <div class="stat-card"><span class="label">Lote Atual</span><span class="value" id="stBatchName">-</span></div>
                <div class="stat-card"><span class="label">Arquivos Lidos</span><span class="value" id="stProgress">0/0</span></div>
                <div class="stat-card"><span class="label">Produzidos</span><span class="value" id="stGenerated" style="color: var(--success);">0</span></div>
                <div class="stat-card"><span class="label">Tempo Restante</span><span class="value" id="stEta">00:00</span></div>
            </div>
            <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
            <div id="downloads"></div>
        </div>
    </div>

    <a href="#" class="watermark-ui">Desenvolvido por Breno Coutinho</a>

    <script>
        const yieldToBrowser = (ms = 15) => new Promise(r => setTimeout(r, ms));
        const cleanExcel = (s) => s ? s.replace(/^="(.+)"$/, '$1').replace(/^"(.+)"$/, '$1').trim() : "";
        
        let isPaused = false, isStopped = false, csvDB = {}, rawFiles = [], generatedUrls = [];

        // --- EXPORTAR CSV ---
        document.getElementById('btnExportCsv').addEventListener('click', () => {
            const names = new Set();
            rawFiles.forEach(f => names.add(f.name.split('.').slice(0,-1).join('.').replace(/_PD\d+$/i, '')));
            let content = "NOME ATUAL;NOVO NOME;LOTE\n";
            names.forEach(n => {
                const val = /^\d+$/.test(n) || n.length > 12 ? `="${n}"` : n;
                content += `${val};;\n`;
            });
            const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "Template_CoutMerge.csv";
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        });

        // --- CARREGAR CSV ---
        document.getElementById('csvInput').addEventListener('change', (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n').filter(l => l.trim());
                const sep = lines[0].includes(';') ? ';' : ',';
                const head = lines[0].split(sep).map(h => cleanExcel(h).toUpperCase());
                const iAtu = head.indexOf('NOME ATUAL'), iNov = head.indexOf('NOVO NOME'), iLot = head.indexOf('LOTE');
                csvDB = {};
                lines.slice(1).forEach(l => {
                    const c = l.split(sep).map(cleanExcel);
                    if (c[iAtu]) csvDB[c[iAtu]] = { novo: c[iNov] || c[iAtu], lote: c[iLot] || "" };
                });
                document.getElementById('csvName').innerText = `✅ CSV OK: ${f.name}`;
            };
            reader.readAsText(f);
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            rawFiles = Array.from(e.target.files);
            document.getElementById('filesCountUI').innerText = `✅ ${rawFiles.length} Arquivos Carregados`;
            document.getElementById('btnExportCsv').style.display = 'block';
        });

        // --- COMPRESSOR ---
        const compress = (f) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = (e) => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas');
                    let w = i.width, h = i.height;
                    if(w>1200||h>1200) { w>h ? (h=(h*1200)/w, w=1200) : (w=(w*1200)/h, h=1200); }
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(i, 0, 0, w, h);
                    c.toBlob(b => b.arrayBuffer().then(res), 'image/jpeg', 0.6);
                };
            };
        });

        // --- MOTOR PRINCIPAL ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            const optM = document.getElementById('chkMerge').checked, optR = document.getElementById('chkRename').checked, optL = document.getElementById('chkLot').checked;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('btnExportCsv').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('bottomDashboard').style.display = 'flex';
            document.getElementById('progressBar').style.display = 'block';

            isPaused = false; isStopped = false;
            let totalGen = 0, procCount = 0, start = Date.now();

            // Mapeamento
            const map = {};
            rawFiles.forEach(f => {
                const base = f.name.split('.').slice(0,-1).join('.').replace(/_PD(\d+)$/i, '');
                const m = f.name.match(/_PD(\d+)/i);
                const info = csvDB[base];
                const lot = optL ? (info?.lote || "Diversos") : "Geral";
                const key = (optM && m) ? base : f.name;

                if(!map[lot]) map[lot] = {};
                if(!map[lot][key]) map[lot][key] = { items: [], base, final: (optR && info) ? info.novo : base };
                map[lot][key].items.push({ f, idx: m ? parseInt(m[1]) : 0, isPD: !!m, ext: f.name.split('.').pop().toLowerCase() });
            });

            // Processamento por Lote (150MB)
            for (const [lot, clients] of Object.entries(map)) {
                if(isStopped) break;
                let zip = new JSZip(), size = 0, part = 1;

                for (const c of Object.values(clients)) {
                    if(isStopped) break;
                    while(isPaused) { if(isStopped) break; await yieldToBrowser(500); }

                    document.getElementById('stStatus').innerText = `Processando: ${c.base}`;
                    document.getElementById('stBatchName').innerText = `${lot} (P${part})`;

                    let buffer, outName;
                    const isMerge = optM && c.items[0].isPD;

                    if (isMerge && c.items.length > 0) {
                        const doc = await PDFLib.PDFDocument.create();
                        c.items.sort((a,b) => a.idx - b.idx);
                        for(const item of c.items) {
                            if(item.ext==='pdf'){
                                const p = await PDFLib.PDFDocument.load(await item.f.arrayBuffer());
                                (await doc.copyPages(p, p.getPageIndices())).forEach(pg => doc.addPage(pg));
                            } else {
                                const img = await doc.embedJpg(await compress(item.f));
                                const pg = doc.addPage([595,842]);
                                const s = Math.min(550/img.width, 800/img.height);
                                pg.drawImage(img, { x: 297-(img.width*s/2), y: 421-(img.height*s/2), width: img.width*s, height: img.height*s });
                            }
                            procCount++;
                            document.getElementById('progressBar').value = (procCount/rawFiles.length)*100;
                            document.getElementById('stProgress').innerText = `${procCount}/${rawFiles.length}`;
                            document.getElementById('stEta').innerText = Math.round(((Date.now()-start)/procCount)*(rawFiles.length-procCount)/1000) + 's';
                            await yieldToBrowser(5);
                        }
                        buffer = await doc.save();
                        outName = `${c.final}.pdf`;
                    } else {
                        const item = c.items[0];
                        buffer = item.f;
                        const suffix = (optR && item.isPD && !optM) ? `_PD${item.idx}` : "";
                        outName = optR ? `${c.final}${suffix}.${item.ext}` : item.f.name;
                        procCount++;
                    }

                    zip.file(outName, buffer);
                    size += (buffer.byteLength || buffer.size || 0);
                    totalGen++;
                    document.getElementById('stGenerated').innerText = totalGen;

                    if(size > 150*1024*1024) {
                        await finishZip(zip, `${lot}_P${part}.zip`);
                        zip = new JSZip(); size = 0; part++;
                    }
                }
                if(Object.keys(zip.files).length > 0) await finishZip(zip, part > 1 ? `${lot}_P${part}.zip` : `${lot}.zip`);
            }
            document.getElementById('stStatus').innerText = isStopped ? "Interrompido." : "Sucesso Total!";
            document.getElementById('clearBtn').style.display = 'block';
        });

        async function finishZip(z, n) {
            const b = await z.generateAsync({type:"blob", compression:"STORE"});
            const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = n;
            document.body.appendChild(a); a.click();
            const btn = document.createElement('a'); btn.className = 'btn-download'; btn.href = u; btn.download = n; btn.innerText = `📦 ${n}`;
            document.getElementById('downloads').appendChild(btn);
            setTimeout(() => document.body.removeChild(a), 100);
        }

        document.getElementById('clearBtn').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
